name: Bug Report
description: Something broken or not working as expected
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `pixeltube browse`
        2. Select a video
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened
  - type: input
    id: terminal
    attributes:
      label: Terminal
      placeholder: "e.g. iTerm2 3.5, kitty 0.36, Terminal.app"
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. macOS 15.2, Ubuntu 24.04"
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "e.g. 22.0.0"
